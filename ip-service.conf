server {
    listen 80;
    server_name _;

    # Root endpoint - returns client IP in JSON
    location / {
        default_type application/json;
        return 200 '{"ip": "$remote_addr", "forwarded_for": "$http_x_forwarded_for", "user_agent": "$http_user_agent", "timestamp": "$time_iso8601"}';
    }

    # Alternative endpoint for just IP
    location /ip {
        default_type application/json;
        return 200 '{"ip": "$remote_addr"}';
    }

    # Plain text endpoint
    location /plain {
        default_type text/plain;
        return 200 '$remote_addr';
    }

    # Health check endpoint
    location /health {
        default_type application/json;
        return 200 '{"status": "ok"}';
    }

    # Detailed info endpoint
    location /info {
        default_type application/json;
        return 200 '{"ip": "$remote_addr", "forwarded_for": "$http_x_forwarded_for", "user_agent": "$http_user_agent", "method": "$request_method", "uri": "$request_uri", "protocol": "$server_protocol", "host": "$host", "timestamp": "$time_iso8601", "server_addr": "$server_addr", "server_port": "$server_port"}';
    }
}